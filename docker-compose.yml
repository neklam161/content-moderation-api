services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime

    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      - ENVIRONMENT=development
      - LOG_JSON=false
      - LOG_LEVEL=DEBUG
    volumes:
      - ./prompts:/app/prompts:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
